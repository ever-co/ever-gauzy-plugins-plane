# Plane Web — static SPA (nginx), listens on 3000. Backend (VITE_API_BASE_URL) is baked
# into the image at build time; no runtime env is read here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-web
  namespace: ${PLANE_NAMESPACE}
  labels: { app.kubernetes.io/name: plane-web, app.kubernetes.io/part-of: plane-ui }
spec:
  replicas: ${REPLICAS}
  selector:
    matchLabels: { app.kubernetes.io/name: plane-web }
  template:
    metadata:
      labels: { app.kubernetes.io/name: plane-web, app.kubernetes.io/part-of: plane-ui }
    spec:
      containers:
        - name: web
          image: ${IMAGE_WEB}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: ${CPU_REQUEST}, memory: ${MEM_REQUEST} }
---
apiVersion: v1
kind: Service
metadata:
  name: plane-web
  namespace: ${PLANE_NAMESPACE}
  labels: { app.kubernetes.io/name: plane-web }
spec:
  selector: { app.kubernetes.io/name: plane-web }
  ports:
    - name: http
      port: 80
      targetPort: 3000
