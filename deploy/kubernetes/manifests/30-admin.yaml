# Plane Admin ("God Mode") — OPTIONAL static SPA (nginx), listens on 3000, served under
# /god-mode (the image COPYs the bundle to html/god-mode). Only deployed when DEPLOY_ADMIN=true.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-admin
  namespace: ${PLANE_NAMESPACE}
  labels: { app.kubernetes.io/name: plane-admin, app.kubernetes.io/part-of: plane-ui }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: plane-admin }
  template:
    metadata:
      labels: { app.kubernetes.io/name: plane-admin, app.kubernetes.io/part-of: plane-ui }
    spec:
      containers:
        - name: admin
          image: ${IMAGE_ADMIN}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet: { path: /god-mode/, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: ${CPU_REQUEST}, memory: ${MEM_REQUEST} }
---
apiVersion: v1
kind: Service
metadata:
  name: plane-admin
  namespace: ${PLANE_NAMESPACE}
  labels: { app.kubernetes.io/name: plane-admin }
spec:
  selector: { app.kubernetes.io/name: plane-admin }
  ports:
    - name: http
      port: 80
      targetPort: 3000
