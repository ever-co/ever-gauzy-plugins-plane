name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    if: github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_COMMIT=$(git rev-list -n 1 "$GITHUB_REF")
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "::error::Tag must be on the main branch. Aborting."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: yarn install --frozen-lockfile

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build from root tsconfig
        run: |
          npx tsc -p tsconfig.json > /dev/null 2>&1 || true
          if [ ! -f dist/packages/plugin-plane/src/index.js ]; then
            echo "::error::Build failed - compiled output not found"
            exit 1
          fi
          echo "Build OK - output files verified"

      - name: Prepare models package
        working-directory: packages/models
        run: |
          mkdir -p dist
          cp -r ../../dist/packages/models/src/* dist/
          if [ -n "$VERSION" ]; then
            CURRENT=$(node -p "require('./package.json').version")
            if [ "$CURRENT" != "$VERSION" ]; then
              npm version "$VERSION" --no-git-tag-version
            fi
          fi

      - name: Publish models
        working-directory: packages/models
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Prepare api package
        working-directory: packages/plugin-plane
        run: |
          mkdir -p dist
          cp -r ../../dist/packages/plugin-plane/src/* dist/
          if [ -n "$VERSION" ]; then
            CURRENT=$(node -p "require('./package.json').version")
            if [ "$CURRENT" != "$VERSION" ]; then
              npm version "$VERSION" --no-git-tag-version
            fi
          fi

      - name: Publish api
        working-directory: packages/plugin-plane
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
